name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    name: HACS-Validierung
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation (category integration)
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
